services:
  # Backend API
  - type: web
    name: financeinsight-api
    env: python
    buildCommand: pip install -r backend/requirements.txt && python backend/download_models.py
    startCommand: cd backend && gunicorn -w 1 -k uvicorn.workers.UvicornWorker app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # Frontend Web App
  - type: static_site
    name: financeinsight-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: financeinsight-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
