<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | FinanceInsight</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

<div class="login-container">
  <h2>Login to FinanceInsight</h2>

  <form>
    <label>Email</label>
    <input type="email" placeholder="Enter email" required>

    <label>Password</label>
    <input type="password" placeholder="Enter password" required>

    <button type="submit" class="primary-btn">Login</button>
  </form>

  <p class="login-note">
    Demo login – no authentication required.<br>
    <a href="dashboard.html">Go directly to Dashboard</a>
  </p>
</div>

</body>
</html>
